<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exclusividades - Gestión</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <section id="loginView" class="card">
      <h1>Acceso al sistema</h1>
      <form id="loginForm">
        <label>Usuario<input name="username" required value="admin" /></label>
        <label>Contraseña<input name="password" type="password" required value="admin123" /></label>
        <button type="submit">Ingresar</button>
      </form>
      <p class="hint">Usuario demo: admin / admin123</p>
    </section>

    <section id="appView" class="hidden">
      <header class="topbar">
        <h1>Dashboard Exclusividades</h1>
        <button id="logoutBtn" class="secondary">Salir</button>
      </header>

      <section class="card filters">
        <h2>Filtros de ventas</h2>
        <label>Desde<input type="date" id="fromDate"></label>
        <label>Hasta<input type="date" id="toDate"></label>
        <button id="applyFilters">Aplicar</button>
      </section>

      <section class="grid kpis">
        <article class="card"><h3>Ventas</h3><p id="kpiSales">0</p></article>
        <article class="card"><h3>Ingresos</h3><p id="kpiRevenue">$0</p></article>
        <article class="card"><h3>Utilidad Bruta</h3><p id="kpiProfit">$0</p></article>
      </section>

      <section class="grid two">
        <article class="card"><h3>Productos más vendidos</h3><div id="topProducts"></div></article>
        <article class="card"><h3>Ventas por mes</h3><div id="salesMonth"></div></article>
      </section>

      <section class="card"><h3>Ventas por día</h3><div id="salesDay"></div></section>

      <section class="grid two">
        <article class="card">
          <h3>Nuevo producto</h3>
          <form id="productForm">
            <input name="name" placeholder="Nombre" required>
            <input name="category" placeholder="Categoría (botas, sombreros...)" required>
            <input name="sku" placeholder="SKU">
            <input name="purchase_price" type="number" step="0.01" placeholder="Costo" required>
            <input name="sale_price" type="number" step="0.01" placeholder="Precio venta" required>
            <input name="stock" type="number" placeholder="Stock inicial" required>
            <button type="submit">Guardar producto</button>
          </form>
        </article>
        <article class="card">
          <h3>Movimiento de caja</h3>
          <form id="cashForm">
            <select name="type"><option>INGRESO</option><option>EGRESO</option></select>
            <input name="amount" type="number" step="0.01" placeholder="Monto" required>
            <input name="description" placeholder="Descripción" required>
            <input name="movement_date" type="date" required>
            <button type="submit">Registrar</button>
          </form>
          <p id="cashBalance"></p>
        </article>
      </section>

      <section class="grid two">
        <article class="card">
          <h3>Registrar venta</h3>
          <form id="saleForm">
            <input name="product_id" type="number" placeholder="ID producto" required>
            <input name="quantity" type="number" placeholder="Cantidad" required>
            <input name="unit_price" type="number" step="0.01" placeholder="Precio unitario" required>
            <input name="sale_date" type="date" required>
            <button type="submit">Registrar venta</button>
          </form>
        </article>
        <article class="card">
          <h3>Registrar compra</h3>
          <form id="purchaseForm">
            <input name="product_id" type="number" placeholder="ID producto" required>
            <input name="quantity" type="number" placeholder="Cantidad" required>
            <input name="unit_cost" type="number" step="0.01" placeholder="Costo unitario" required>
            <input name="purchase_date" type="date" required>
            <button type="submit">Registrar compra</button>
          </form>
        </article>
      </section>

      <section class="card"><h3>Inventario actual</h3><div id="inventory"></div></section>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
